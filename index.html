<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="controls">

<button id="modeBtn">
Play Vs Computer
</button>

<button id="themeBtn">
🌙 Dark Mode
</button>

</div>

<div class="scoreboard">

<div>X : <span id="xScore">0</span></div>

<div>Draw : <span id="drawScore">0</span></div>

<div>O : <span id="oScore">0</span></div>

</div>

<h2 id="status">Player X Turn</h2>

<div class="board" id="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

<button id="restartBtn">
Restart Game
</button>

</div>

<script src="script.js"></script>

</body>
</html>
